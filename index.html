<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajay Translator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px;
    }

    .container {
      width: min(650px, 100%);
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h2 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 24px;
    }

    .lang-select {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    select {
      width: 100%;
      min-height: 42px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
      background: white;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      min-height: 44px;
      padding: 10px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .result-box {
      margin-top: 15px;
      background: #eef3ff;
      padding: 10px;
      border-radius: 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    /* RESULT BLOCK */
    .result-card {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      border: 1px solid #ddd;
    }

    /* TOP BAR (COPY BUTTON AREA) */
    .result-header {
      background: #28a745;
      padding: 6px 10px;
      text-align: right;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .copy-btn,
    .reset-btn {
      width: auto;
      font-size: 12px;
      min-height: 32px;
      padding: 4px 12px;
      background: white;
      color: #28a745;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .reset-btn {
      color: #dc3545;
    }

    /* TEXT AREA */
    .result-content {
      padding: 14px;
      line-height: 1.7;
      font-size: 16px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .result-content p {
      margin: 0 0 10px 0;
    }

    @media (max-width: 520px) {
      body {
        align-items: flex-start;
        padding: 12px;
      }

      .container {
        padding: 16px;
        border-radius: 10px;
      }

      h2 {
        font-size: 21px;
      }

      .lang-select {
        flex-direction: column;
        gap: 10px;
      }

      textarea {
        min-height: 150px;
        font-size: 16px;
      }

      .result-box {
        max-height: 42vh;
      }

      .result-header {
        padding: 8px;
      }

      .copy-btn,
      .reset-btn {
        flex: 1;
      }

      .result-content {
        padding: 12px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🌐 Ajay Translator</h2>

  <div class="lang-select">
    <select id="fromLang">
      <option value="en">English</option>
      <option value="te">Telugu</option>
      <option value="hi">Hindi</option>
    </select>

    <select id="toLang">
      <option value="te">Telugu</option>
      <option value="en">English</option>
      <option value="hi">Hindi</option>
    </select>
  </div>

  <textarea id="inputText" placeholder="Enter text..."></textarea>

  <button id="translateBtn" onclick="translateText()">Translate</button>

  <div id="results" class="result-box"></div>
</div>

<script>
async function translateText() {
  const input = document.getElementById("inputText").value.trim();
  const from = document.getElementById("fromLang").value;
  const to = document.getElementById("toLang").value;
  const translateBtn = document.getElementById("translateBtn");

  if (!input) return alert("Enter text");

  try {
    translateBtn.disabled = true;
    translateBtn.innerText = "Translating...";

    const res = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=${from}|${to}`
    );

    const data = await res.json();
    const translated = data.responseData && data.responseData.translatedText;

    if (!translated) {
      throw new Error("Translation missing");
    }

    const resultBox = document.getElementById("results");

    // MAIN CARD
    const card = document.createElement("div");
    card.className = "result-card";

    // HEADER (COPY BUTTON)
    const header = document.createElement("div");
    header.className = "result-header";

    const btn = document.createElement("button");
    btn.innerText = "Copy";
    btn.className = "copy-btn";

    btn.onclick = () => {
      const textToCopy = content.innerText.trim();
      navigator.clipboard.writeText(textToCopy);
      // document.getElementById("inputText").value = "";
      btn.innerText = "Copied!";
      setTimeout(() => btn.innerText = "Copy", 1500);
    };

    const resetBtn = document.createElement("button");
    resetBtn.innerText = "Reset";
    resetBtn.className = "reset-btn";

    resetBtn.onclick = () => {
      document.getElementById("inputText").value = "";
      card.remove();
    };

    header.appendChild(btn);
    header.appendChild(resetBtn);

    // CONTENT (TEXT)
    const content = document.createElement("div");
    content.className = "result-content";

    const inputPara = document.createElement("p");
    inputPara.textContent = input;

    const translatedPara = document.createElement("p");
    translatedPara.textContent = translated;

    content.appendChild(inputPara);
    content.appendChild(translatedPara);

    // APPEND STRUCTURE
    card.appendChild(header);
    card.appendChild(content);
    resultBox.appendChild(card);

  } catch (err) {
    alert("Error translating");
  } finally {
    translateBtn.disabled = false;
    translateBtn.innerText = "Translate";
  }
}
</script>

</body>
</html>
